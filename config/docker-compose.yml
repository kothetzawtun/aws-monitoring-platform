services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - /opt/monitoring/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/monitoring/config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - /opt/monitoring/config/prometheus/targets:/etc/prometheus/targets:ro
      - /data/prometheus:/prometheus
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - /opt/monitoring/config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /data/alertmanager:/alertmanager
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_DOMAIN: ${DOMAIN_NAME}
      GF_SERVER_ROOT_URL: https://${DOMAIN_NAME}/
    volumes:
      - /data/grafana:/var/lib/grafana
      - /opt/monitoring/config/grafana/provisioning:/etc/grafana/provisioning
      - /opt/monitoring/config/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro,rslave"
    restart: unless-stopped
    networks:
      - monitoring

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    command:
      - "--config.file=/etc/blackbox_exporter/blackbox.yml"
    volumes:
      - /opt/monitoring/config/blackbox/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
    restart: unless-stopped
    networks:
      - monitoring

  nginx:
    image: nginx:stable
    container_name: nginx
    depends_on:
      - grafana
      - prometheus
      - alertmanager
      - blackbox-exporter
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/monitoring/config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/ssl:/opt/ssl:ro
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
