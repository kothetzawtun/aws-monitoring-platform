global:
  resolve_timeout: 5m

route:
  receiver: email
  group_by: ["alertname", "client_name", "environment"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: email
    email_configs:
      - to: ops@example.com
        from: alertmanager@example.com
        smarthost: smtp.example.com:587
        auth_username: alertmanager@example.com
        auth_password: CHANGE_ME
        require_tls: true
